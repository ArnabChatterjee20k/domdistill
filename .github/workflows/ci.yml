name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check domdistill tests benchmarks

      - name: Pytest
        run: pytest

      - name: Benchmark (prints current results)
        run: |
          python benchmarks/bench_chunker_pool.py --html-file benchmarks/blog.html --repeat-factor 10 --warmup-runs 1 --iterations 3 --pool-sizes 1,2
